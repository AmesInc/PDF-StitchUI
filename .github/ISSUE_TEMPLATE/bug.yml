name: Bug Report
description: Report a defect in app behavior, packaging, workflow, or repo automation.
title: "Bug: "
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the defect.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - stitch workflow
        - split workflow
        - export / generated PDFs
        - packaging / installer
        - CI / workflow automation
        - branding / assets
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Java version, packaged build vs jar, and any relevant file/setup context.
      placeholder: |
        - OS:
        - Java version:
        - App distribution:
        - Sample document details:
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs / Screenshots / Notes
      description: Include log excerpts, screenshots, or repro notes when available.
